kind = "web"
previewPath = "/"
title = "LettiB"
version = "1.0.0"
id = "artifacts/lettib"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23546

[services.development]
run = "pnpm --filter @workspace/lettib run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lettib", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lettib", "run", "start" ]

[services.env]
PORT = "23546"
